name: Validate MCP Catalog

on:
  # Run weekly on Monday at 00:00 UTC
  schedule:
    - cron: '0 0 * * 1'

  # Run on PRs that modify catalog files
  pull_request:
    paths:
      - 'src/recommendation/data/*.yaml'
      - 'scripts/validate-catalog.ts'

  # Manual trigger
  workflow_dispatch:
    inputs:
      fix_dates:
        description: 'Update lastVerified dates for valid entries'
        required: false
        default: 'false'
        type: boolean

jobs:
  validate:
    name: Validate Catalog Entries
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run catalog validation
        id: validate
        run: |
          if [ "${{ github.event.inputs.fix_dates }}" = "true" ]; then
            npm run validate-catalog:fix
          else
            npm run validate-catalog
          fi
        continue-on-error: true

      - name: Create validation report artifact
        if: always()
        run: |
          npm run validate-catalog 2>&1 | tee validation-report.txt || true

      - name: Upload validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catalog-validation-report
          path: validation-report.txt
          retention-days: 30

      - name: Comment on PR (if validation failed)
        if: github.event_name == 'pull_request' && steps.validate.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('validation-report.txt', 'utf8');

            // Extract summary
            const lines = report.split('\n');
            const summaryStart = lines.findIndex(l => l.includes('VALIDATION REPORT'));
            const summary = lines.slice(summaryStart, summaryStart + 20).join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ⚠️ Catalog Validation Failed\n\n\`\`\`\n${summary}\n\`\`\`\n\nPlease check the [validation report](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`
            });

      - name: Commit updated dates (if fix_dates and on main)
        if: github.event.inputs.fix_dates == 'true' && github.ref == 'refs/heads/main'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/recommendation/data/*.yaml
          git diff --staged --quiet || git commit -m "chore: update catalog lastVerified dates [skip ci]"
          git push

      - name: Fail if validation failed
        if: steps.validate.outcome == 'failure'
        run: exit 1
