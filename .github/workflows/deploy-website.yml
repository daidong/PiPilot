name: Deploy Website to Public Repo

on:
  push:
    branches: [main]
    paths: ['website/**']
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - run: cd website && npm ci
      - run: cd website && npm run build

      - name: Publish to DIR-LAB/Research-Pilot gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          external_repository: DIR-LAB/Research-Pilot
          publish_branch: gh-pages
          publish_dir: ./website/dist
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "Deploy website from ${{ github.repository }}@${{ github.sha }}"
