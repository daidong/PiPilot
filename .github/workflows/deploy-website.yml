name: Deploy Website to Public Repo

on:
  push:
    branches: [main]
    paths: ['website/**']
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - run: cd website && npm ci

      # Primary build → DIR-LAB/Research-Pilot (canonical going forward).
      - name: Build for DIR-LAB/Research-Pilot
        env:
          SITE_URL: https://dir-lab.github.io
          SITE_BASE: /Research-Pilot/
        run: cd website && npm run build && mv dist dist-dir-lab

      # Transitional mirror → daidong/PiPilot. Same site, base re-pointed
      # so /PiPilot/ asset paths resolve. Will be removed once the old
      # repo flips to private (Pages won't serve anyway).
      - name: Build for daidong/PiPilot (transitional mirror)
        env:
          SITE_URL: https://daidong.github.io
          SITE_BASE: /PiPilot/
        run: cd website && npm run build && mv dist dist-daidong

      - name: Publish to DIR-LAB/Research-Pilot gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          external_repository: DIR-LAB/Research-Pilot
          publish_branch: gh-pages
          publish_dir: ./website/dist-dir-lab
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "Deploy website from ${{ github.repository }}@${{ github.sha }}"

      - name: Publish to daidong/PiPilot gh-pages (transitional)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./website/dist-daidong
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "Deploy website (transitional mirror) @${{ github.sha }}"
