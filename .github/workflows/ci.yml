name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build:
    # Cross-platform matrix: telemetry JSONL writers must be byte-identical across
    # darwin/linux/win32 (per docs/spec/telemetry-trace.md §5.1). The build job is
    # the protected branch's required check; test failures on any runner block merge.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Test (telemetry)
        run: npm test

      - name: Build
        run: npm run build
