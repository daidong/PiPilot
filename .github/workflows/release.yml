name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        # ubuntu-latest builds the x64 Linux artifacts; ubuntu-24.04-arm
        # (a free GitHub-hosted arm64 runner for public repos) builds the
        # arm64 ones natively, so native modules like node-pty get real
        # arm64 binaries instead of relying on x64→arm64 cross-packaging.
        # Each Linux runner builds only its host arch (the linux target in
        # app/package.json intentionally has no `arch` array), so the two
        # legs publish disjoint files to the same draft release:
        #   x64   → *-amd64.deb, *-x86_64.AppImage, latest-linux.yml
        #   arm64 → *-arm64.deb, *-arm64.AppImage,  latest-linux-arm64.yml
        os: [macos-latest, windows-2022, ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install workspace deps
        run: npm ci

      - name: Build (electron-vite + native targets)
        working-directory: app
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.MAC_CERTS || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.MAC_CERTS_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.os == 'macos-latest' && secrets.APPLE_TEAM_ID || '' }}
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            npx electron-vite build && npx electron-builder --mac --publish always
          elif [ "${{ matrix.os }}" = "windows-2022" ]; then
            npx electron-vite build && npx electron-builder --win --publish always
          else
            npx electron-vite build && npx electron-builder --linux --publish always
          fi

  # Flip the draft release that the build matrix populated to public.
  # Runs only after all three platform legs succeed — partial uploads
  # stay as drafts and can be cleaned up by hand if a leg fails.
  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      actions: write
    steps:
      - name: Publish release on DIR-LAB/Research-Pilot
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --latest --repo DIR-LAB/Research-Pilot

      # Astro reads the latest release tag at build time, so a fresh
      # release means the website's version badges + asset links are
      # stale until we rebuild. Dispatch deploy-website.yml so the
      # static site picks up the just-published tag.
      - name: Trigger website redeploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-website.yml --ref main --repo "$GITHUB_REPOSITORY"
