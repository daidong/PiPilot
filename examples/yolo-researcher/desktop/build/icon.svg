<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#0c4a4e"/>
      <stop offset="40%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0f3d3e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.45">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#2dd4bf" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Subtle inner border -->
  <rect x="8" y="8" width="1008" height="1008" rx="218" fill="none" stroke="#5eead4" stroke-width="2" opacity="0.08"/>

  <!-- Center glow -->
  <circle cx="512" cy="440" r="380" fill="url(#glow)"/>

  <!-- Y shape with soft glow — the research branching tree -->
  <g filter="url(#shadow)">
    <!-- Trunk: bottom to junction -->
    <line x1="512" y1="770" x2="512" y2="460" stroke="#ccfbf1" stroke-width="54" stroke-linecap="round"/>
    <!-- Left branch -->
    <line x1="512" y1="460" x2="285" y2="235" stroke="#ccfbf1" stroke-width="48" stroke-linecap="round"/>
    <!-- Right branch -->
    <line x1="512" y1="460" x2="739" y2="235" stroke="#ccfbf1" stroke-width="48" stroke-linecap="round"/>
  </g>

  <!-- Sub-branch from left (thinner, representing deeper exploration) -->
  <line x1="370" y1="322" x2="220" y2="310" stroke="#99f6e4" stroke-width="14" stroke-linecap="round" opacity="0.55"/>
  <!-- Sub-branch from right -->
  <line x1="654" y1="322" x2="804" y2="310" stroke="#99f6e4" stroke-width="14" stroke-linecap="round" opacity="0.55"/>

  <!-- Node dots — evidence endpoints -->
  <!-- Left main branch tip -->
  <circle cx="285" cy="235" r="42" fill="url(#nodeGlow)"/>
  <circle cx="285" cy="235" r="28" fill="#2dd4bf"/>
  <circle cx="285" cy="235" r="42" fill="none" stroke="#5eead4" stroke-width="3" opacity="0.4"/>

  <!-- Right main branch tip -->
  <circle cx="739" cy="235" r="42" fill="url(#nodeGlow)"/>
  <circle cx="739" cy="235" r="28" fill="#2dd4bf"/>
  <circle cx="739" cy="235" r="42" fill="none" stroke="#5eead4" stroke-width="3" opacity="0.4"/>

  <!-- Left sub-branch tip -->
  <circle cx="220" cy="310" r="12" fill="#5eead4" opacity="0.7"/>
  <circle cx="220" cy="310" r="20" fill="none" stroke="#5eead4" stroke-width="2" opacity="0.3"/>

  <!-- Right sub-branch tip -->
  <circle cx="804" cy="310" r="12" fill="#5eead4" opacity="0.7"/>
  <circle cx="804" cy="310" r="20" fill="none" stroke="#5eead4" stroke-width="2" opacity="0.3"/>

  <!-- Center junction node (the branch point) -->
  <circle cx="512" cy="460" r="48" fill="url(#nodeGlow)"/>
  <circle cx="512" cy="460" r="32" fill="#5eead4"/>
  <circle cx="512" cy="460" r="48" fill="none" stroke="#99f6e4" stroke-width="3" opacity="0.35"/>

  <!-- Bottom root node -->
  <circle cx="512" cy="770" r="26" fill="#2dd4bf"/>
  <circle cx="512" cy="770" r="38" fill="none" stroke="#2dd4bf" stroke-width="3" opacity="0.35"/>

  <!-- Subtle orbital arc — representing the autonomous loop -->
  <ellipse cx="512" cy="470" rx="340" ry="95" fill="none" stroke="#5eead4" stroke-width="2.5" opacity="0.12" stroke-dasharray="16 10"/>

  <!-- Small decorative particles / stars -->
  <circle cx="180" cy="520" r="4" fill="#5eead4" opacity="0.3"/>
  <circle cx="850" cy="440" r="3.5" fill="#5eead4" opacity="0.25"/>
  <circle cx="340" cy="720" r="3" fill="#5eead4" opacity="0.2"/>
  <circle cx="720" cy="680" r="3.5" fill="#5eead4" opacity="0.22"/>
  <circle cx="160" cy="340" r="3" fill="#99f6e4" opacity="0.18"/>
  <circle cx="870" cy="650" r="2.5" fill="#99f6e4" opacity="0.15"/>
</svg>
