<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#0a3d40"/>
      <stop offset="50%" stop-color="#0d4f4f"/>
      <stop offset="100%" stop-color="#082e30"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
      <stop offset="60%" stop-color="#0d4f4f" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.25"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.5">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.18"/>
      <stop offset="70%" stop-color="#14b8a6" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nodeGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full canvas fill — no transparent corners -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Vignette overlay -->
  <rect width="1024" height="1024" fill="url(#vignette)"/>

  <!-- Subtle grid pattern (research notebook feel) -->
  <g opacity="0.03" stroke="#5eead4" stroke-width="1">
    <line x1="256" y1="0" x2="256" y2="1024"/>
    <line x1="512" y1="0" x2="512" y2="1024"/>
    <line x1="768" y1="0" x2="768" y2="1024"/>
    <line x1="0" y1="256" x2="1024" y2="256"/>
    <line x1="0" y1="512" x2="1024" y2="512"/>
    <line x1="0" y1="768" x2="1024" y2="768"/>
  </g>

  <!-- Center glow -->
  <circle cx="512" cy="440" r="400" fill="url(#glow)"/>

  <!-- Y branching tree -->
  <!-- Trunk: bottom to junction -->
  <line x1="512" y1="760" x2="512" y2="460" stroke="#ccfbf1" stroke-width="48" stroke-linecap="round" opacity="0.95"/>
  <!-- Left branch -->
  <line x1="512" y1="460" x2="290" y2="240" stroke="#ccfbf1" stroke-width="42" stroke-linecap="round" opacity="0.9"/>
  <!-- Right branch -->
  <line x1="512" y1="460" x2="734" y2="240" stroke="#ccfbf1" stroke-width="42" stroke-linecap="round" opacity="0.9"/>

  <!-- Sub-branches (thinner — deeper exploration) -->
  <line x1="374" y1="324" x2="230" y2="315" stroke="#5eead4" stroke-width="10" stroke-linecap="round" opacity="0.4"/>
  <line x1="650" y1="324" x2="794" y2="315" stroke="#5eead4" stroke-width="10" stroke-linecap="round" opacity="0.4"/>

  <!-- Orbital arc — the autonomous loop -->
  <ellipse cx="512" cy="470" rx="310" ry="78" fill="none" stroke="#5eead4" stroke-width="2" opacity="0.1" stroke-dasharray="14 8"/>

  <!-- Node: left branch tip -->
  <circle cx="290" cy="240" r="36" fill="url(#nodeGlow)"/>
  <circle cx="290" cy="240" r="22" fill="#2dd4bf"/>
  <circle cx="290" cy="240" r="8" fill="#ccfbf1" opacity="0.7"/>

  <!-- Node: right branch tip -->
  <circle cx="734" cy="240" r="36" fill="url(#nodeGlow)"/>
  <circle cx="734" cy="240" r="22" fill="#2dd4bf"/>
  <circle cx="734" cy="240" r="8" fill="#ccfbf1" opacity="0.7"/>

  <!-- Node: left sub-branch tip -->
  <circle cx="230" cy="315" r="8" fill="#5eead4" opacity="0.6"/>

  <!-- Node: right sub-branch tip -->
  <circle cx="794" cy="315" r="8" fill="#5eead4" opacity="0.6"/>

  <!-- Node: center junction -->
  <circle cx="512" cy="460" r="40" fill="url(#nodeGlow)"/>
  <circle cx="512" cy="460" r="26" fill="#5eead4"/>
  <circle cx="512" cy="460" r="10" fill="#ccfbf1" opacity="0.6"/>

  <!-- Node: bottom root -->
  <circle cx="512" cy="760" r="22" fill="#2dd4bf"/>
  <circle cx="512" cy="760" r="8" fill="#ccfbf1" opacity="0.5"/>

  <!-- Decorative particles -->
  <circle cx="175" cy="510" r="3" fill="#5eead4" opacity="0.2"/>
  <circle cx="845" cy="420" r="2.5" fill="#5eead4" opacity="0.18"/>
  <circle cx="350" cy="700" r="2" fill="#5eead4" opacity="0.15"/>
  <circle cx="710" cy="660" r="2.5" fill="#5eead4" opacity="0.16"/>
  <circle cx="155" cy="350" r="2" fill="#99f6e4" opacity="0.12"/>
  <circle cx="860" cy="630" r="2" fill="#99f6e4" opacity="0.1"/>
</svg>
