# Tool Catalog
# Human-editable catalog of built-in tools and packs for the recommendation system

version: "1.0.0"
lastUpdated: "2025-01-24"

tools:
  # ============================================================================
  # Safe Tools
  # ============================================================================
  - name: read
    category: safe
    description: "Read file content with pagination support for large files"
    useCases:
      - Read source code files
      - View configuration files
      - Analyze log files
      - Read documentation
    keywords:
      - file
      - read
      - content
      - source
      - code
      - text
      - 文件
      - 读取
    riskLevel: safe
    requiresApproval: false
    providedBy: safe
    exampleUsage: 'read({ path: "src/index.ts" })'

  - name: write
    category: safe
    description: "Write file content, create or overwrite files"
    useCases:
      - Create new files
      - Generate reports
      - Save processing results
      - Create configuration files
    keywords:
      - file
      - write
      - create
      - save
      - output
      - 写入
      - 创建
      - 保存
    riskLevel: safe
    requiresApproval: false
    providedBy: safe
    exampleUsage: 'write({ path: "output.txt", content: "..." })'

  - name: edit
    category: safe
    description: "Edit file content with precise replacement"
    useCases:
      - Modify source code
      - Update configuration
      - Batch text replacement
      - Code refactoring
    keywords:
      - file
      - edit
      - modify
      - replace
      - update
      - 编辑
      - 修改
      - 替换
    riskLevel: safe
    requiresApproval: false
    providedBy: safe
    exampleUsage: 'edit({ path: "file.ts", old: "foo", new: "bar" })'

  - name: glob
    category: safe
    description: "Match file paths by pattern"
    useCases:
      - Find files of specific types
      - Traverse directory structure
      - Prepare for batch file operations
    keywords:
      - file
      - find
      - search
      - pattern
      - match
      - 查找
      - 搜索
      - 匹配
    riskLevel: safe
    requiresApproval: false
    providedBy: safe
    exampleUsage: 'glob({ pattern: "**/*.ts" })'

  - name: grep
    category: safe
    description: "Search for content in files"
    useCases:
      - Search for functions in code
      - Find specific text
      - Log analysis
      - Code review
    keywords:
      - search
      - find
      - content
      - text
      - pattern
      - 搜索
      - 查找
      - 内容
    riskLevel: safe
    requiresApproval: false
    providedBy: safe
    exampleUsage: 'grep({ pattern: "function.*", path: "src/" })'

  - name: ctx-get
    category: safe
    description: "Get context information (repo structure, Git status, etc.)"
    useCases:
      - Understand project structure
      - Get Git information
      - View session history
    keywords:
      - context
      - info
      - repo
      - git
      - project
      - 上下文
      - 信息
    riskLevel: safe
    requiresApproval: false
    providedBy: safe
    exampleUsage: 'ctx-get({ source: "repo.index" })'

  # ============================================================================
  # Compute Tools
  # ============================================================================
  - name: llm-call
    category: compute
    description: "LLM sub-call for complex reasoning tasks"
    useCases:
      - Text classification
      - Summary generation
      - Structured data extraction
      - Complex reasoning
    keywords:
      - llm
      - ai
      - generate
      - classify
      - summarize
      - extract
      - 生成
      - 分类
      - 摘要
    riskLevel: elevated
    requiresApproval: false
    providedBy: compute
    exampleUsage: 'llm-call({ prompt: "Classify this text...", jsonMode: true })'

  - name: llm-expand
    category: compute
    description: "Text expansion, generate multiple variants (query expansion, synonyms, etc.)"
    useCases:
      - Search query expansion
      - Synonym generation
      - Multi-angle rephrasing
      - Keyword expansion
    keywords:
      - expand
      - query
      - synonym
      - rephrase
      - variation
      - 扩展
      - 同义词
      - 重写
    riskLevel: elevated
    requiresApproval: false
    providedBy: compute
    exampleUsage: 'llm-expand({ text: "machine learning", style: "search", domain: "academic" })'

  - name: llm-filter
    category: compute
    description: "Relevance filtering, score and filter lists"
    useCases:
      - Search result filtering
      - Content relevance ranking
      - Quality filtering
      - Match scoring
    keywords:
      - filter
      - relevance
      - score
      - rank
      - quality
      - 过滤
      - 相关性
      - 排序
      - 评分
    riskLevel: elevated
    requiresApproval: false
    providedBy: compute
    exampleUsage: 'llm-filter({ items: [...], query: "...", minScore: 5 })'

  # ============================================================================
  # Network Tools
  # ============================================================================
  - name: fetch
    category: network
    description: "HTTP requests for external API calls"
    useCases:
      - Call REST APIs
      - Get web page content
      - Download files
      - Third-party service integration
    keywords:
      - http
      - api
      - request
      - web
      - download
      - fetch
      - url
      - 请求
      - 下载
      - API
    riskLevel: elevated
    requiresApproval: true
    providedBy: network
    exampleUsage: 'fetch({ url: "https://api.example.com/data", method: "GET" })'

  # ============================================================================
  # Exec Tools
  # ============================================================================
  - name: bash
    category: exec
    description: "Execute shell commands"
    useCases:
      - Run build scripts
      - System administration
      - Process management
      - Environment configuration
    keywords:
      - shell
      - command
      - terminal
      - script
      - execute
      - run
      - 命令
      - 执行
      - 脚本
    riskLevel: high
    requiresApproval: true
    providedBy: exec
    exampleUsage: 'bash({ command: "npm run build" })'

  # ============================================================================
  # Browser Tools
  # ============================================================================
  - name: browser
    category: browser
    description: "Browser automation operations"
    useCases:
      - Web scraping
      - Screenshot generation
      - Form filling
      - E2E testing
    keywords:
      - browser
      - web
      - scrape
      - screenshot
      - automation
      - 浏览器
      - 网页
      - 抓取
    riskLevel: high
    requiresApproval: true
    providedBy: browser
    exampleUsage: 'browser({ action: "navigate", url: "https://example.com" })'

  - name: browse
    category: browser
    description: "Simplified web browsing tool"
    useCases:
      - Read web page content
      - Extract web information
    keywords:
      - browse
      - web
      - page
      - content
      - 浏览
      - 网页
    riskLevel: elevated
    requiresApproval: true
    providedBy: browser
    exampleUsage: 'browse({ url: "https://example.com" })'

packs:
  - name: safe
    description: "Safe core toolkit: file operations, search"
    tools:
      - read
      - write
      - edit
      - glob
      - grep
      - ctx-get
    riskLevel: safe
    keywords:
      - file
      - read
      - write
      - search
      - 文件
      - 读写

  - name: compute
    description: "LLM compute toolkit: sub-calls, expansion, filtering"
    tools:
      - llm-call
      - llm-expand
      - llm-filter
    riskLevel: elevated
    keywords:
      - llm
      - ai
      - generate
      - filter
      - expand
      - 生成
      - 过滤

  - name: network
    description: "Network toolkit: HTTP requests"
    tools:
      - fetch
    riskLevel: elevated
    keywords:
      - http
      - api
      - web
      - request
      - 网络
      - 请求
      - API

  - name: exec
    description: "Execution toolkit: shell commands"
    tools:
      - bash
    riskLevel: high
    keywords:
      - shell
      - command
      - execute
      - script
      - 命令
      - 执行

  - name: browser
    description: "Browser toolkit: web automation"
    tools:
      - browser
      - browse
    riskLevel: high
    keywords:
      - browser
      - web
      - scrape
      - automation
      - 浏览器
      - 网页
