# MCP Server Catalog
# Human-editable catalog of MCP servers for the init wizard and recommendation system
#
# Validation: Run `npm run validate-catalog` to check npm packages and documentation links
# To update lastVerified dates for valid entries: `npm run validate-catalog:fix`

version: "1.2.0"
lastUpdated: "2026-01-25"

entries:
  # ============================================================================
  # Database - Local data persistence for agent memory and state
  # ============================================================================
  - name: sqlite
    package: "mcp-server-sqlite-npx"
    description: "SQLite database operations for local databases"
    category: database
    keywords:
      - database
      - sql
      - sqlite
      - local
      - query
      - data
      - embedded
      - memory
      - persistence
      - 数据库
      - 本地
      - 查询
    useCases:
      - Local database queries
      - Agent memory persistence
      - Application data access
      - Data analysis
      - Schema inspection
    popularity: high
    riskLevel: elevated
    configTemplate:
      type: simple
      id: sqlite
      name: sqlite
      transport:
        type: stdio
        command: npx
        args:
          - "-y"
          - "mcp-server-sqlite-npx"
          - "${SQLITE_DB_PATH}"
    envVars:
      - SQLITE_DB_PATH
    envVarDescriptions:
      SQLITE_DB_PATH: "Path to SQLite database file (e.g., /path/to/database.db)"
    installCommand: "npx -y mcp-server-sqlite-npx /path/to/database.db"
    documentation: "https://github.com/johnnyoshika/mcp-server-sqlite-npx"
    permissions:
      - type: database
        access: read-write
        scope: configured-database
    platform:
      - darwin
      - linux
      - win32
    lastVerified: "2026-01-25"

  # ============================================================================
  # Search - Web information retrieval for real-time data access
  # ============================================================================
  - name: brave-search
    package: "@modelcontextprotocol/server-brave-search"
    description: "Brave Search API web search"
    category: search
    keywords:
      - search
      - web
      - internet
      - query
      - find
      - lookup
      - research
      - 搜索
      - 网络
      - 查询
    useCases:
      - Web information search
      - Real-time data retrieval
      - Research and investigation
      - Current events lookup
    popularity: high
    riskLevel: safe
    configTemplate:
      type: simple
      id: brave-search
      name: brave-search
      transport:
        type: stdio
        command: npx
        args:
          - "-y"
          - "@modelcontextprotocol/server-brave-search"
    envVars:
      - BRAVE_API_KEY
    envVarDescriptions:
      BRAVE_API_KEY: "Brave Search API Key, get it at: https://brave.com/search/api/"
    installCommand: "npx -y @modelcontextprotocol/server-brave-search"
    documentation: "https://github.com/modelcontextprotocol/servers"
    permissions:
      - type: api
        access: read
        scope: brave-search-api
    platform:
      - darwin
      - linux
      - win32
    lastVerified: "2026-01-24"

  # ============================================================================
  # Documents - Document processing and format conversion for LLM input
  # ============================================================================
  - name: markitdown
    package: "markitdown-mcp-npx"
    description: "Microsoft's MarkItDown tool for converting documents, images, and audio to markdown"
    category: documents
    keywords:
      - markdown
      - convert
      - pdf
      - word
      - excel
      - powerpoint
      - image
      - audio
      - docx
      - xlsx
      - pptx
      - html
      - youtube
      - ocr
      - transcription
      - microsoft
      - 转换
      - 文档
      - 图片
      - 音频
    useCases:
      - Convert documents to markdown
      - Extract text from PDF files
      - Process Office documents (Word, Excel, PowerPoint)
      - Image OCR to markdown
      - Audio transcription
      - YouTube transcript extraction
      - HTML content extraction
    popularity: high
    riskLevel: safe
    configTemplate:
      type: simple
      id: markitdown
      name: markitdown
      transport:
        type: stdio
        command: npx
        args:
          - "-y"
          - "markitdown-mcp-npx"
    installCommand: "npx -y markitdown-mcp-npx"
    documentation: "https://github.com/microsoft/markitdown"
    permissions:
      - type: filesystem
        access: read
        scope: local-files
      - type: network
        access: read
        scope: url-fetch
    platform:
      - darwin
      - linux
      - win32
    requires:
      dependencies:
        - "Node.js 16+"
        - "Python 3.10+"
    lastVerified: "2026-01-25"
