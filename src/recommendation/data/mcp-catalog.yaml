# MCP Server Catalog
# Human-editable catalog of MCP servers for the init wizard and recommendation system
#
# Validation: Run `npm run validate-catalog` to check npm packages and documentation links
# To update lastVerified dates for valid entries: `npm run validate-catalog:fix`

version: "1.1.0"
lastUpdated: "2026-01-24"

entries:
  # ============================================================================
  # Database
  # ============================================================================
  - name: postgres
    package: "@modelcontextprotocol/server-postgres"
    description: "PostgreSQL database operations with query and schema management"
    category: database
    keywords:
      - database
      - sql
      - postgres
      - postgresql
      - query
      - data
      - 数据库
      - 查询
    useCases:
      - Database queries and analysis
      - Data import/export
      - Schema management
    popularity: high
    riskLevel: elevated
    configTemplate:
      type: simple
      id: postgres
      name: postgres
      transport:
        type: stdio
        command: npx
        args:
          - "-y"
          - "@modelcontextprotocol/server-postgres"
    envVars:
      - POSTGRES_CONNECTION_STRING
    envVarDescriptions:
      POSTGRES_CONNECTION_STRING: "PostgreSQL connection string, format: postgresql://user:pass@host:5432/db"
    installCommand: "npx -y @modelcontextprotocol/server-postgres"
    documentation: "https://github.com/modelcontextprotocol/servers"
    permissions:
      - type: database
        access: read-write
        scope: configured-database
    platform:
      - darwin
      - linux
      - win32
    lastVerified: "2026-01-24"

